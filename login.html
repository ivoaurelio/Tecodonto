<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smartte Manager</title>
    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="css/login.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-body">
    <!-- SITE NAVBAR FOR CONTINUOUS NAVIGATION -->
    <header class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo-smartte.png" alt="Smartte Logo" id="header-logo">
            </a>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-link" style="color: var(--primary-blue); font-weight: 600;"><i class="fa-solid fa-arrow-left"></i> Voltar ao Site</a></li>
                </ul>
            </nav>
        </div>
    </header>
    
    <div class="login-container fade-in-up">
        <div class="login-card">
            <div class="login-header">
                <h2>Acesso ao Painel</h2>
                <p>Gestão Inteligente de Clínicas</p>
            </div>

            <form id="form-login" class="modern-form">
                
                <div class="form-group">
                    <label for="loginClinic">ID da Clínica (user_name)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-building input-icon"></i>
                        <input type="text" id="loginClinic" name="loginClinic" placeholder="Ex: clinica_sorriso ou MESTRE" required autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginUser">Login (E-mail ou Usuário)</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="loginUser" name="loginUser" placeholder="Seu acesso" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Senha</label>
                    <div class="input-wrapper" style="position: relative;">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" name="loginPassword" placeholder="••••••••" required autocomplete="current-password" minlength="6" maxlength="8">
                        <i class="fa-solid fa-eye" id="togglePassword" style="position: absolute; right: 1.5rem; top: 0; bottom: 0; margin: auto; height: fit-content; display: flex; align-items: center; cursor: pointer; color: var(--text-light); font-size: 1.2rem; z-index: 5;" title="Mostrar senha"></i>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-submit" id="btn-login" style="margin-top: 1.5rem; width: 100%; justify-content: center; padding: 1rem; font-size: 1.1rem; border-radius: 12px;">
                    <span class="btn-text">Acessar Sistema</span>
                    <i class="fa-solid fa-arrow-right-to-bracket btn-icon"></i>
                    <span class="loader" style="display: none;"></span>
                </button>
                
                <div id="loginMessage" class="form-message" style="display: none; margin-top: 1rem;"></div>
            </form>

            <div class="login-footer">
                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Voltar ao site principal</a>
                <p style="margin-top: 15px; color: var(--text-light); font-size: 0.85rem;">Powered by <strong>Smartte</strong></p>
            </div>
        </div>
    </div>
    
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    
    <script src="js/supabase.js?v=2"></script>
    <script src="js/login.js?v=2"></script>
</body>
</html>
