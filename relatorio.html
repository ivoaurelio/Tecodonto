<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório | Tecodonto Manutenção</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/relatorio.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/auth.js"></script>
</head>
<body class="admin-body">
    <header class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Tecodonto Logo" id="header-logo">
            </a>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="admin.html" class="nav-link">Painel</a></li>
                    <li><a href="cadastro-salas.html" class="nav-link">Salas</a></li>
                    <li><a href="cadastro-ativos.html" class="nav-link">Ativos</a></li>
                    <li><a href="relatorio.html" class="nav-link active">Relatório</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-main print-main">
        <div class="admin-container fade-in-up" style="max-width: 900px;">
            <div class="form-header no-print">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-file-lines"></i>
                </div>
                <h1>Relatório de <span>Manutenção</span></h1>
                <p>Visão geral de todas as salas e ativos cadastrados na clínica.</p>
                <div class="report-actions">
                    <button id="btn-print" class="btn btn-primary" onclick="window.print()">
                        <i class="fa-solid fa-print"></i> Imprimir / PDF
                    </button>
                    <button id="btn-refresh" class="btn btn-secondary" onclick="location.reload()">
                        <i class="fa-solid fa-rotate-right"></i> Atualizar Dados
                    </button>
                </div>
            </div>

            <!-- Print Header only visible during print -->
            <div class="print-header">
                <h2>Tecodonto - Relatório de Manutenção e Ativos</h2>
                <p id="print-date"></p>
                <hr>
            </div>

            <div class="admin-card report-card">
                <div id="loader-container" class="loader-container">
                    <div class="loader report-loader"></div>
                    <p>Buscando dados da nuvem...</p>
                </div>

                <div id="report-content" class="report-content" style="display: none;">
                    <!-- Javascript goes here -->
                </div>
            </div>
        </div>
        
        <div class="bg-shape shape-1 no-print"></div>
        <div class="bg-shape shape-2 no-print"></div>
    </main>

    <script src="js/relatorio.js"></script>
</body>
</html>
