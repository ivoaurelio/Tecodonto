<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Equipe | Tecodonto Manutenção</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</head>
<body class="admin-body">
    <header class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Tecodonto Logo" id="header-logo">
            </a>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="admin.html" class="nav-link">Painel</a></li>
                    <li><a href="gestao-equipe.html" class="nav-link active">Equipe</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-container fade-in-up">
            <div class="form-header">
                <div class="icon-wrapper" style="background: rgba(245, 158, 11, 0.1); color: #d97706;">
                    <i class="fa-solid fa-users"></i>
                </div>
                <h1>Gestão de <span id="clinic-name-display">Equipe</span></h1>
                <p>Cadastre suportes e operadores para acesso à sua clínica.</p>
            </div>

            <div class="admin-card req-admin">
                <form id="form-gestao-equipe" class="modern-form">
                    
                    <input type="hidden" name="formType" value="CadastroUsuario">
                    
                    <div class="form-group req-superadmin" style="display: none;" id="targetClinicGroup">
                        <label for="targetClinic">Vincular a qual Clínica? (Admin Global)</label>
                        <div class="select-wrapper">
                            <select id="targetClinic" name="targetClinic">
                                <option value="" selected>Nenhuma clínica carregada</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="userName">Nome Completo</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-id-card input-icon"></i>
                            <input type="text" id="userName" name="nome" placeholder="Nome do membro da equipe" required>
                        </div>
                    </div>

                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="userEmail">E-mail (Login)</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-envelope input-icon"></i>
                                <input type="email" id="userEmail" name="email" placeholder="usuario@clinica.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="userPassword">Senha</label>
                            <div class="input-wrapper" style="position: relative;">
                                <i class="fa-solid fa-key input-icon"></i>
                                <input type="password" id="userPassword" name="senha" placeholder="6 a 8 caracteres" required minlength="6" maxlength="8">
                                <i class="fa-solid fa-eye" id="toggleUserPassword" style="position: absolute; right: 1.5rem; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-light); font-size: 1.2rem; z-index: 5;" title="Mostrar senha"></i>
                            </div>
                        </div>
                    </div>
                    
                    <script>
                        document.addEventListener('DOMContentLoaded', () => {
                            const toggleUserPassword = document.getElementById('toggleUserPassword');
                            const userPassword = document.getElementById('userPassword');
                            if (toggleUserPassword && userPassword) {
                                toggleUserPassword.addEventListener('click', () => {
                                    const type = userPassword.getAttribute('type') === 'password' ? 'text' : 'password';
                                    userPassword.setAttribute('type', type);
                                    toggleUserPassword.classList.toggle('fa-eye');
                                    toggleUserPassword.classList.toggle('fa-eye-slash');
                                });
                            }
                        });
                    </script>

                    <div class="form-group">
                        <label for="userLevel">Nível de Acesso</label>
                        <div class="select-wrapper">
                            <select id="userLevel" name="nivel" required>
                                <option value="" disabled selected>Selecione o cargo</option>
                                <option value="Administrador">Administrador (Gestor da Clínica)</option>
                                <option value="Suporte">Suporte (Edição Total)</option>
                                <option value="Operador">Operador (Visualização Apenas)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem; align-items: stretch;">
                        <button type="submit" class="btn btn-primary btn-submit" id="submitBtnEquipe" style="margin: 0; background: #059669; border: none; flex: 1; color: white; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <span class="btn-text">Cadastrar Membro</span>
                            <i class="fa-solid fa-user-plus btn-icon" style="margin: 0;"></i>
                            <span class="loader" style="display: none;"></span>
                        </button>
                        <button type="button" class="btn" onclick="cancelarEdicaoUsuario()" style="margin: 0; background: #f97316; color: white; border: none; font-weight: 600; padding: 0.8rem 1.5rem; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <i class="fa-solid fa-eraser"></i> Limpar / Cancelar
                        </button>
                    </div>
                    
                    <div id="formMessageEquipe" class="form-message" style="display: none;"></div>
                </form>
            </div>
            
            <!-- Lista de Usuários da Clínica -->
            <div class="admin-card req-admin" style="margin-top: 2rem;">
                <h3 style="margin-bottom: 1.5rem; color: var(--text-dark);">Equipe Atual</h3>
                <div style="max-height: 250px; overflow-y: auto; overflow-x: auto; padding-right: 0.5rem;" class="custom-scrollbar">
                    <div id="equipeList" style="text-align: left; padding: 1rem 0;">
                        <p style="color: var(--text-light);"><span class="loader" style="display:inline-block; border-top-color: var(--primary-green); width:20px; height:20px;"></span> Carregando informações da nuvem...</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
    </main>

    <script src="js/admin.js"></script>
    <script src="js/gestao.js"></script>
</body>
</html>
