<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Salas | Tecodonto Manutenção</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/auth.js"></script>
</head>

<body class="admin-body">
    <header class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Tecodonto Logo" id="header-logo">
            </a>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="admin.html" class="nav-link">Painel</a></li>
                    <li><a href="cadastro-salas.html" class="nav-link active">Salas</a></li>
                    <li><a href="cadastro-ativos.html" class="nav-link">Ativos</a></li>
                    <li><a href="relatorio.html" class="nav-link">Relatório</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-container fade-in-up">
            <div class="form-header">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-door-open"></i>
                </div>
                <h1>Cadastro de <span>Salas</span></h1>
                <p>Registre os ambientes do seu consultório para o plano de manutenção.</p>
            </div>

            <div class="admin-card">
                <form id="form-cadastro-salas" class="modern-form">
                    
                    <input type="hidden" name="formType" value="Salas">
                    
                    <div class="form-group">
                        <label for="roomType">Tipo de Sala</label>
                        <div class="select-wrapper">
                            <select id="roomType" name="roomType" required>
                                <option value="" disabled selected>Selecione o tipo de ambiente</option>
                                <option value="Sala Clínica">Sala Clínica</option>
                                <option value="Sala Técnica">Sala Técnica</option>
                                <option value="Sala de Suporte Clínico">Sala de Suporte Clínico</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="roomName">Nome da Sala</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-tag input-icon"></i>
                            <input type="text" id="roomName" name="roomName" maxlength="25" placeholder="Ex: Clínica 01, Esterilização..." required>
                            <span class="char-count" id="charCount">0/25</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="roomNumber">Número da Sala</label>
                        <div class="select-wrapper">
                            <select id="roomNumber" name="roomNumber" required>
                                <option value="" disabled selected>Selecione o número</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-submit" id="submitBtn">
                        <span class="btn-text">Cadastrar Sala</span>
                        <i class="fa-solid fa-check btn-icon"></i>
                        <span class="loader" style="display: none;"></span>
                    </button>
                    
                    <div id="formMessage" class="form-message" style="display: none;"></div>
                </form>
            </div>
            
            <!-- Lista de Salas Registradas -->
            <div id="salas-container" class="admin-card" style="margin-top: 2rem;">
                <h3 style="margin-bottom: 1.5rem; color: var(--text-dark); border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem;"><i class="fa-solid fa-list-check"></i> Salas Cadastradas</h3>
                <div id="salasList" style="text-align: center; padding: 1rem;">
                    <p style="color: var(--text-light);"><span class="loader" style="display:inline-block; border-top-color: var(--primary-green); width:20px; height:20px;"></span> Carregando salas...</p>
                </div>
            </div>

        </div>
        <!-- Shapes de fundo para manter o estilo vibrante -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
    </main>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('userName') || '';
            const scriptURL = 'https://script.google.com/macros/s/AKfycbzED4U_6fqEidlD2zAjl81W4Z3vyv51XrzfMWhtJfVHZANqg7UCgiscQ1fUTnzdj-KFWA/exec';
            const salasList = document.getElementById('salasList');
            if (salasList) {
                fetch(`${scriptURL}?action=getRooms&user_name=${userName}`)
                    .then(res => res.json())
                    .then(data => {
                        const salas = data.salas || [];
                        if(salas.length === 0) {
                            salasList.innerHTML = '<p class="empty-state">Nenhuma sala cadastrada ainda.</p>';
                        } else {
                            let html = '<table class="assets-table" style="font-size: 0.9rem;"><thead><tr><th>Tipo</th><th>Sala</th><th>Número</th></tr></thead><tbody>';
                            salas.forEach(s => {
                                html += `<tr><td>${s.tipo}</td><td>${s.nome}</td><td><strong>${s.numero}</strong></td></tr>`;
                            });
                            html += '</tbody></table>';
                            salasList.innerHTML = html;
                        }
                    })
                    .catch(err => salasList.innerHTML = '<p style="color:red">Erro de conexão.</p>');
            }
        });
    </script>
</body>
</html>
