<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Salas | Smartte Manutenção</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</head>

<body class="admin-body">
    <header class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo-smartte.png" alt="Smartte Logo" id="header-logo">
            </a>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="admin.html" class="nav-link">Painel</a></li>
                    <li><a href="cadastro-salas.html" class="nav-link active">Salas</a></li>
                    <li><a href="cadastro-ativos.html" class="nav-link">Ativos</a></li>
                    <li><a href="relatorio.html" class="nav-link">Relatório</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-container fade-in-up">
            <div class="form-header">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-door-open"></i>
                </div>
                <h1>Cadastro de <span>Salas</span></h1>
                <p>Registre os ambientes do seu consultório para o plano de manutenção.</p>
            </div>

            <div class="admin-card">
                <form id="form-cadastro-salas" class="modern-form">
                    
                    <input type="hidden" name="formType" value="CadastroSala">
                    
                    <div class="form-group">
                        <label for="roomType">Tipo de Sala</label>
                        <div class="select-wrapper">
                            <select id="roomType" name="roomType" required>
                                <option value="" disabled selected>Selecione o tipo de ambiente</option>
                                <option value="Sala Clínica">Sala Clínica</option>
                                <option value="Sala Técnica">Sala Técnica</option>
                                <option value="Sala de Suporte Clínico">Sala de Suporte Clínico</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="roomName">Nome da Sala</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-tag input-icon"></i>
                            <input type="text" id="roomName" name="roomName" maxlength="25" placeholder="Ex: Clínica 01, Esterilização..." required>
                            <span class="char-count" id="charCount">0/25</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="roomNumber">Número da Sala</label>
                        <div class="select-wrapper">
                            <select id="roomNumber" name="roomNumber" required>
                                <option value="" disabled selected>Selecione o número</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem; align-items: stretch;">
                        <button type="submit" class="btn btn-primary btn-submit" id="submitBtn" style="margin: 0; background: #059669; border: none; flex: 1; color: white; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <span class="btn-text">Cadastrar Sala</span>
                            <i class="fa-solid fa-check btn-icon" style="margin: 0;"></i>
                            <span class="loader" style="display: none;"></span>
                        </button>
                        <button type="reset" class="btn" style="margin: 0; background: #f97316; color: white; border: none; font-weight: 600; padding: 0.8rem 1.5rem; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <i class="fa-solid fa-eraser"></i> Limpar Campos
                        </button>
                    </div>
                    
                    <div id="formMessage" class="form-message" style="display: none;"></div>
                </form>
            </div>
            
            <!-- Lista de Salas Registradas -->
            <div id="salas-container" class="admin-card" style="margin-top: 2rem;">
                <h3 style="margin-bottom: 1.5rem; color: var(--text-dark); border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem;"><i class="fa-solid fa-list-check"></i> Salas Cadastradas</h3>
                <div id="salasList" style="padding: 1rem;">
                    <p style="color: var(--text-light); text-align: center;"><span class="loader" style="display:inline-block; border-top-color: var(--primary-green); width:20px; height:20px;"></span> Carregando salas...</p>
                </div>
            </div>

        </div>
        <!-- Shapes de fundo para manter o estilo vibrante -->
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
    </main>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = sessionStorage.getItem('userName') || '';
            const salasList = document.getElementById('salasList');
            if (salasList) {
                window.cancelarEdicaoSala = function() {
                    const form = document.getElementById('form-cadastro-salas');
                    if (form) delete form.dataset.editId;
                    const btn = document.getElementById('submitBtn');
                    if (btn) btn.querySelector('.btn-text').textContent = 'Cadastrar Sala';
                };

                window.editarSala = function(id) {
                    if (!window.currentSalas) return;
                    const sala = window.currentSalas.find(s => s.id === id);
                    if (!sala) return;
                    
                    document.getElementById('roomType').value = sala.tipo;
                    document.getElementById('roomName').value = sala.nome;
                    document.getElementById('roomNumber').value = sala.numero;
                    
                    const form = document.getElementById('form-cadastro-salas');
                    form.dataset.editId = sala.id;
                    document.getElementById('submitBtn').querySelector('.btn-text').textContent = 'Atualizar Sala';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                window.deletarSala = function(id) {
                    window.mostrarConfirmacaoGlobal("ATENÇÃO: A exclusão desta Sala também apagará TODOS os equipamentos e ativos vinculados a ela do sistema. Tem certeza que deseja continuar?", true, () => {
                        // Deleta os ativos vinculados a esta sala primeiro para evitar orfãos
                        window.supabaseFetch(`ativos?sala=eq.${encodeURIComponent(id)}`, { method: 'DELETE' })
                            .then(() => {
                                // Depois deleta a sala
                                return window.supabaseFetch(`salas?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE' });
                            })
                            .then(() => document.dispatchEvent(new Event('salaCadastrada')))
                            .catch(err => window.mostrarAlertaGlobal('Erro ao excluir sala ou ativos: ' + err.message, false));
                    });
                };

                function carregarSalas() {
                    salasList.innerHTML = '<p style="color: var(--text-light); text-align: center;"><span class="loader" style="display:inline-block; border-top-color: var(--primary-green); width:20px; height:20px;"></span> Carregando salas...</p>';
                    window.supabaseFetch(`salas?user_name=eq.${encodeURIComponent(userName)}&select=*&order=numero.asc`)
                        .then(salas => {
                            window.currentSalas = salas || [];
                            if (!salas || salas.length === 0) {
                                salasList.innerHTML = '<p class="empty-state">Nenhuma sala cadastrada ainda.</p>';
                            } else {
                                let html = '<div style="overflow-x: auto; width: 100%;"><table class="assets-table" style="font-size: 0.95rem; width: 100%; text-align: left; min-width: 500px;"><thead><tr><th style="width: 80px; text-align: center;">Ações</th><th style="text-align: left;">Tipo</th><th style="text-align: left;">Sala</th></tr></thead><tbody>';
                                salas.forEach(s => {
                                    html += `<tr>
                                        <td style="white-space: nowrap; text-align: center;">
                                            <button type="button" onclick="editarSala('${s.id}')" title="Editar" style="background:none; border:none; color:#0ea5e9; cursor:pointer; margin-right:8px; font-size:1.1rem;"><i class="fa-solid fa-pen-to-square"></i></button>
                                            <button type="button" onclick="deletarSala('${s.id}')" title="Excluir" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:1.1rem;"><i class="fa-solid fa-trash-can"></i></button>
                                        </td>
                                        <td style="padding: 0.8rem;">${s.tipo}</td>
                                        <td style="padding: 0.8rem;">${s.nome}</td>
                                    </tr>`;
                                });
                                html += '</tbody></table></div>';
                                salasList.innerHTML = html;
                            }
                        })
                        .catch(err => salasList.innerHTML = '<p style="color:red">Erro de conexão com o banco.</p>');
                }
                
                carregarSalas();
                document.addEventListener('salaCadastrada', carregarSalas);
            }
        });
    </script>
    <footer style="text-align: center; padding: 20px; color: var(--text-light); font-size: 0.9rem; position: relative; z-index: 10;">
        Powered by <strong>Smartte</strong>
    </footer>
</body>
</html>
