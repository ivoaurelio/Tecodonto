<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Ativos | Tecodonto Manutenção</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
</head>

<body class="admin-body">
    <!-- HIDDEN DATA ANCHORS FOR auth.js -->
    <img id="print-clinic-logo" src="" style="display: none;">
    <h2 id="print-clinic-name" style="display: none;"></h2>
    
    <header class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Tecodonto Logo" id="header-logo">
            </a>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="admin.html" class="nav-link">Painel</a></li>
                    <li><a href="cadastro-salas.html" class="nav-link">Salas</a></li>
                    <li><a href="cadastro-ativos.html" class="nav-link active">Ativos</a></li>
                    <li><a href="relatorio.html" class="nav-link">Relatório</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-container fade-in-up">
            <div class="form-header">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-microscope"></i>
                </div>
                <h1>Cadastro de <span>Ativos</span></h1>
                <p>Registre os equipamentos odontológicos da sua clínica.</p>
            </div>

            <div class="admin-card">
                <form id="form-cadastro-ativos" class="modern-form">
                    
                    <input type="hidden" name="formType" value="CadastroAtivo">
                    
                    <!-- LOCALIZAÇÃO DINÂMICA -->
                    <div class="form-group">
                        <label for="registeredRoom">Sala (Local do Ativo)</label>
                        <div class="select-wrapper">
                            <select id="registeredRoom" name="registeredRoom" required>
                                <option value="" disabled selected>Carregando salas (isso pode levar uns segundos)...</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <!-- Campos ocultos para manter o formato de envio -->
                    <input type="hidden" name="roomType" id="hiddenRoomType">
                    <input type="hidden" name="roomNumber" id="hiddenRoomNumber">

                    <!-- IDENTIFICAÇÃO REMOVIDA DA INTERFACE (Gerado no Banco) -->

                    <div class="form-group">
                        <label for="assetType">Equipamento</label>
                        <div class="select-wrapper">
                            <select id="assetType" name="assetType" required>
                                <option value="" disabled selected>Selecione um equipamento</option>
                                <option value="Cadeira odontológica">Cadeira odontológica</option>
                                <option value="Equipo">Equipo</option>
                                <option value="Refletor">Refletor</option>
                                <option value="Sugador / Sistema de Vácuo">Sugador / Sistema de Vácuo</option>
                                <option value="Seringa Tríplice">Seringa Tríplice</option>
                                <option value="Caneta de alta rotação">Caneta de alta rotação</option>
                                <option value="Caneta de baixa rotação">Caneta de baixa rotação</option>
                                <option value="Micromotor">Micromotor</option>
                                <option value="Autoclave">Autoclave</option>
                                <option value="Compressor">Compressor</option>
                                <option value="Bomba de vácuo">Bomba de vácuo</option>
                                <option value="Outros">Outros</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div class="form-group" id="otherAssetGroup" style="display: none;">
                        <label for="otherAsset">Especifique o equipamento</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-pen input-icon"></i>
                            <input type="text" id="otherAsset" name="otherAsset" placeholder="Qual o equipamento?">
                        </div>
                    </div>

                    <!-- DETALHES -->
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="brandModel">Marca / Modelo</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-tag input-icon"></i>
                                <input type="text" id="brandModel" name="brandModel" placeholder="Ex: Kavo / Unik" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="serialNumber">Nº de Série</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-hashtag input-icon"></i>
                                <input type="text" id="serialNumber" name="serialNumber" placeholder="Ex: 123456789">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="criticality">Criticidade do Ativo</label>
                        <div class="select-wrapper">
                            <select id="criticality" name="criticality" required>
                                <option value="" disabled selected>Selecione a criticidade</option>
                                <option value="Baixa">Baixa (Pode aguardar)</option>
                                <option value="Média">Média (Atenção moderada)</option>
                                <option value="Alta">Alta (Paralisa a clínica)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem; align-items: stretch;">
                        <button type="submit" class="btn btn-primary btn-submit" id="submitBtnAtivos" style="margin: 0; background: #059669; border: none; flex: 1; color: white; padding: 0.8rem 1.5rem; border-radius: 8px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <span class="btn-text">Cadastrar Equipamento</span>
                            <i class="fa-solid fa-check btn-icon" style="margin: 0;"></i>
                            <span class="loader" style="display: none;"></span>
                        </button>
                        <button type="reset" class="btn" onclick="cancelarEdicaoAtivo();" style="margin: 0; background: #f97316; color: white; border: none; font-weight: 600; padding: 0.8rem 1.5rem; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                            <i class="fa-solid fa-eraser"></i> Limpar / Cancelar
                        </button>
                    </div>
                    
                    <div id="formMessageAtivos" class="form-message" style="display: none;"></div>
                </form>
            </div>

            <!-- Lista de Ativos Registrados -->
            <div id="ativos-container" class="admin-card" style="margin-top: 2rem;">
                <h3 style="margin-bottom: 1.5rem; color: var(--text-dark); border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem;"><i class="fa-solid fa-list-check"></i> Ativos Cadastrados</h3>
                <div id="ativosList" style="padding: 1rem;">
                    <p style="color: var(--text-light); text-align: center;"><span class="loader" style="display:inline-block; border-top-color: var(--primary-green); width:20px; height:20px;"></span> Carregando ativos...</p>
                </div>
            </div>

        </div>
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
    </main>

    <script src="js/supabase.js"></script>
    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = sessionStorage.getItem('userName') || '';
            const ativosList = document.getElementById('ativosList');
            if (ativosList) {
                window.cancelarEdicaoAtivo = function() {
                    const form = document.getElementById('form-cadastro-ativos');
                    if (form) delete form.dataset.editId;
                    const btn = document.getElementById('submitBtnAtivos');
                    if (btn) btn.querySelector('.btn-text').textContent = 'Cadastrar Equipamento';
                    document.getElementById('otherAssetGroup').style.display='none';
                };

                window.editarAtivo = function(id) {
                    if (!window.currentAtivos) return;
                    const ativo = window.currentAtivos.find(a => a.id === id);
                    if (!ativo) return;
                    
                    document.getElementById('registeredRoom').value = ativo.sala;
                    
                    const selectTipo = document.getElementById('assetType');
                    const arrayTiposPadroes = ["Cadeira Odontológica", "Equipo", "Refletor", "Unidade de Água", "Mocho", "Compressor", "Bomba a Vácuo", "Autoclave", "Destiladora de Água", "Incubadora", "Fotopolimerizador", "Aparelho de Profilaxia", "Ultrassom", "Motor Endodôntico", "Localizador Apical", "Motor de Implante", "Raio-X (Periapical/Panorâmico)", "Sensor Digital", "Amalgamador", "Misturador de Alginato"];
                    
                    if (arrayTiposPadroes.includes(ativo.tipo)) {
                        selectTipo.value = ativo.tipo;
                        document.getElementById('otherAssetGroup').style.display = 'none';
                    } else {
                        selectTipo.value = "Outros";
                        document.getElementById('otherAssetGroup').style.display = 'block';
                        document.getElementById('otherAsset').value = ativo.tipo;
                    }
                    
                    document.getElementById('brandModel').value = ativo.modelo || '';
                    document.getElementById('serialNumber').value = ativo.numero_serie || '';
                    
                    const criRadios = document.getElementsByName('criticality');
                    for (let r of criRadios) {
                        if (r.value === ativo.criticidade) r.checked = true;
                    }
                    
                    const form = document.getElementById('form-cadastro-ativos');
                    form.dataset.editId = ativo.id;
                    document.getElementById('submitBtnAtivos').querySelector('.btn-text').textContent = 'Atualizar Equipamento';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };

                window.deletarAtivo = function(id) {
                    window.mostrarConfirmacaoGlobal("Tem certeza que deseja excluir este equipamento?", true, () => {
                        window.supabaseFetch(`ativos?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE' })
                            .then(() => document.dispatchEvent(new Event('ativoCadastrado')))
                            .catch(err => window.mostrarAlertaGlobal('Erro ao excluir: ' + err.message, false));
                    });
                };

                function carregarAtivos() {
                    ativosList.innerHTML = '<p style="color: var(--text-light); text-align: center;"><span class="loader" style="display:inline-block; border-top-color: var(--primary-green); width:20px; height:20px;"></span> Carregando ativos...</p>';
                    Promise.all([
                        window.supabaseFetch(`salas?user_name=eq.${encodeURIComponent(userName)}&select=id,numero,nome`),
                        window.supabaseFetch(`ativos?user_name=eq.${encodeURIComponent(userName)}&select=*&order=created_at.desc`)
                    ])
                    .then(([salasData, ativosData]) => {
                        const roomMap = {};
                        salasData.forEach(r => {
                            roomMap[r.id] = r.nome ? r.nome : `Sala ${r.numero}`;
                        });
                        
                        window.currentAtivos = ativosData || [];
                        const ativos = window.currentAtivos;
                        if(ativos.length === 0) {
                            ativosList.innerHTML = '<p class="empty-state">Nenhum equipamento cadastrado ainda.</p>';
                        } else {
                            let html = '<div style="overflow-x: auto; width: 100%;"><table class="assets-table" style="font-size: 0.95rem; width: 100%; text-align: left; min-width: 650px;"><thead><tr><th style="width: 80px; text-align: center;">Ações</th><th style="text-align: left;">Cód / ID</th><th style="text-align: left;">Tipo</th><th style="text-align: left;">Local</th><th style="text-align: left;">Marca / Modelo</th><th style="text-align: left;">Criticidade</th></tr></thead><tbody>';
                            ativos.forEach(a => {
                                let bg = a.criticidade === 'Baixa' ? '#e2e8f0' : (a.criticidade === 'Média' ? '#fef08a' : '#fecaca');
                                let fr = a.criticidade === 'Baixa' ? '#334155' : (a.criticidade === 'Média' ? '#854d0e' : '#991b1b');
                                html += `<tr>
                                    <td style="white-space: nowrap; text-align: center;">
                                        <button type="button" onclick="editarAtivo('${a.id}')" title="Editar" style="background:none; border:none; color:#0ea5e9; cursor:pointer; margin-right:8px; font-size:1.1rem;"><i class="fa-solid fa-pen-to-square"></i></button>
                                        <button type="button" onclick="deletarAtivo('${a.id}')" title="Excluir" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:1.1rem;"><i class="fa-solid fa-trash-can"></i></button>
                                    </td>
                                    <td style="padding: 0.8rem; font-weight: 600; color: var(--primary-blue);">${a.codigo || a.id.substring(0,8)}</td>
                                    <td style="padding: 0.8rem;">${a.tipo}</td>
                                    <td style="padding: 0.8rem;">${roomMap[a.sala] || '?'}</td>
                                    <td style="padding: 0.8rem;">${a.modelo || '-'}</td>
                                    <td style="padding: 0.8rem;"><span class="criticality-badge" style="background:${bg}; color:${fr}; font-size: 0.75rem; padding: 0.2rem 0.5rem; text-transform: uppercase;">${a.criticidade}</span></td>
                                </tr>`;
                            });
                            html += '</tbody></table></div>';
                            ativosList.innerHTML = html;
                        }
                    })
                    .catch(err => {
                        console.error(err);
                        ativosList.innerHTML = '<p style="color:red">Erro de conexão com o banco de dados.</p>';
                    });
                }
                
                carregarAtivos();
                document.addEventListener('ativoCadastrado', carregarAtivos);
            }
        });
    </script>
</body>
</html>
