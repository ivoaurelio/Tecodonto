<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Ativos | Tecodonto Manutenção</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/auth.js"></script>
</head>

<body class="admin-body">
    <header class="navbar scrolled" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Tecodonto Logo" id="header-logo">
            </a>
            <nav class="nav-menu">
                <ul class="nav-list">
                    <li><a href="admin.html" class="nav-link">Painel</a></li>
                    <li><a href="cadastro-salas.html" class="nav-link">Salas</a></li>
                    <li><a href="cadastro-ativos.html" class="nav-link active">Ativos</a></li>
                    <li><a href="relatorio.html" class="nav-link">Relatório</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="admin-main">
        <div class="admin-container fade-in-up">
            <div class="form-header">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-microscope"></i>
                </div>
                <h1>Cadastro de <span>Ativos</span></h1>
                <p>Registre os equipamentos odontológicos da sua clínica.</p>
            </div>

            <div class="admin-card">
                <form id="form-cadastro-ativos" class="modern-form">
                    
                    <input type="hidden" name="formType" value="Ativos">
                    
                    <!-- LOCALIZAÇÃO DINÂMICA -->
                    <div class="form-group">
                        <label for="registeredRoom">Sala (Local do Ativo)</label>
                        <div class="select-wrapper">
                            <select id="registeredRoom" name="registeredRoom" required>
                                <option value="" disabled selected>Carregando salas (isso pode levar uns segundos)...</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <!-- Campos ocultos para manter o formato de envio -->
                    <input type="hidden" name="roomType" id="hiddenRoomType">
                    <input type="hidden" name="roomNumber" id="hiddenRoomNumber">

                    <!-- IDENTIFICAÇÃO REMOVIDA DA INTERFACE (Gerado no Banco) -->

                    <div class="form-group">
                        <label for="assetType">Equipamento</label>
                        <div class="select-wrapper">
                            <select id="assetType" name="assetType" required>
                                <option value="" disabled selected>Selecione um equipamento</option>
                                <option value="Cadeira odontológica">Cadeira odontológica</option>
                                <option value="Equipo">Equipo</option>
                                <option value="Refletor">Refletor</option>
                                <option value="Sugador / Sistema de Vácuo">Sugador / Sistema de Vácuo</option>
                                <option value="Seringa Tríplice">Seringa Tríplice</option>
                                <option value="Caneta de alta rotação">Caneta de alta rotação</option>
                                <option value="Caneta de baixa rotação">Caneta de baixa rotação</option>
                                <option value="Micromotor">Micromotor</option>
                                <option value="Autoclave">Autoclave</option>
                                <option value="Compressor">Compressor</option>
                                <option value="Bomba de vácuo">Bomba de vácuo</option>
                                <option value="Outros">Outros</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <div class="form-group" id="otherAssetGroup" style="display: none;">
                        <label for="otherAsset">Especifique o equipamento</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-pen input-icon"></i>
                            <input type="text" id="otherAsset" name="otherAsset" placeholder="Qual o equipamento?">
                        </div>
                    </div>

                    <!-- DETALHES -->
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="brandModel">Marca / Modelo</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-tag input-icon"></i>
                                <input type="text" id="brandModel" name="brandModel" placeholder="Ex: Kavo / Unik" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="serialNumber">Nº de Série</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-hashtag input-icon"></i>
                                <input type="text" id="serialNumber" name="serialNumber" placeholder="Ex: 123456789">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="criticality">Criticidade do Ativo</label>
                        <div class="select-wrapper">
                            <select id="criticality" name="criticality" required>
                                <option value="" disabled selected>Selecione a criticidade</option>
                                <option value="Baixa">Baixa (Pode aguardar)</option>
                                <option value="Média">Média (Atenção moderada)</option>
                                <option value="Alta">Alta (Paralisa a clínica)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down select-icon"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-submit" id="submitBtnAtivos">
                        <span class="btn-text">Cadastrar Equipamento</span>
                        <i class="fa-solid fa-check btn-icon"></i>
                        <span class="loader" style="display: none;"></span>
                    </button>
                    
                    <div id="formMessageAtivos" class="form-message" style="display: none;"></div>
                </form>
            </div>

            <!-- Lista de Ativos Registrados -->
            <div id="ativos-container" class="admin-card" style="margin-top: 2rem;">
                <h3 style="margin-bottom: 1.5rem; color: var(--text-dark); border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem;"><i class="fa-solid fa-list-check"></i> Ativos Cadastrados</h3>
                <div id="ativosList" style="text-align: center; padding: 1rem;">
                    <p style="color: var(--text-light);"><span class="loader" style="display:inline-block; border-top-color: var(--primary-green); width:20px; height:20px;"></span> Carregando ativos...</p>
                </div>
            </div>

        </div>
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
    </main>

    <script src="js/admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('userName') || '';
            const scriptURL = 'https://script.google.com/macros/s/AKfycbzED4U_6fqEidlD2zAjl81W4Z3vyv51XrzfMWhtJfVHZANqg7UCgiscQ1fUTnzdj-KFWA/exec';
            const ativosList = document.getElementById('ativosList');
            if (ativosList) {
                fetch(`${scriptURL}?action=getReport&user_name=${userName}`)
                    .then(res => res.json())
                    .then(data => {
                        const ativos = data.ativos || [];
                        if(ativos.length === 0) {
                            ativosList.innerHTML = '<p class="empty-state">Nenhum equipamento cadastrado ainda.</p>';
                        } else {
                            let html = '<table class="assets-table" style="font-size: 0.9rem;"><thead><tr><th>ID</th><th>Equipamento</th><th>Marca</th><th>Local</th><th>Criticidade</th></tr></thead><tbody>';
                            ativos.forEach(a => {
                                let bg = a.criticidade === 'Baixa' ? '#e2e8f0' : (a.criticidade === 'Média' ? '#fef08a' : '#fecaca');
                                let fr = a.criticidade === 'Baixa' ? '#334155' : (a.criticidade === 'Média' ? '#854d0e' : '#991b1b');
                                html += `<tr>
                                    <td><strong>${a.id}</strong></td>
                                    <td>${a.equipamento}</td>
                                    <td>${a.marca}</td>
                                    <td>Sala ${a.numero}</td>
                                    <td><span class="criticality-badge" style="background:${bg}; color:${fr}; font-size: 0.75rem; padding: 0.2rem 0.5rem; text-transform: uppercase;">${a.criticidade}</span></td>
                                </tr>`;
                            });
                            html += '</tbody></table>';
                            ativosList.innerHTML = html;
                        }
                    })
                    .catch(err => ativosList.innerHTML = '<p style="color:red">Erro de conexão.</p>');
            }
        });
    </script>
</body>
</html>
